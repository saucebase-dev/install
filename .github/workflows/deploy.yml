name: Deploy install scripts to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          cp install.sh install.ps1 README.md _site/
          # Serve the unix script at the bare domain root so
          # `curl -fsSL install.saucebase.dev | bash` works (Pages serves index.html at /).
          cp install.sh _site/index.html
          # Custom domain + disable Jekyll so files serve verbatim.
          echo 'install.saucebase.dev' > _site/CNAME
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
